name: Build Python wheels

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish_pypi:
        description: "Publish to PyPI (prod)"
        type: boolean
        default: false

jobs:
  check-actor:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Restrict manual trigger
        if: github.actor != 'eeiaao'
        run: |
          echo "::error::Only eeiaao can trigger this workflow manually."
          exit 1

  build-wheels:
    needs: [check-actor]
    if: always() && (needs.check-actor.result == 'success' || needs.check-actor.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: pip install cibuildwheel==2.22.0

      - name: Build wheels
        run: cibuildwheel --output-dir wheelhouse python/
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux_* pp*"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_MACOS: "arm64"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"
          CIBW_ENVIRONMENT_MACOS: "MACOSX_DEPLOYMENT_TARGET=14.0"
          CIBW_BUILD_VERBOSITY: 1

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build-sdist:
    needs: [check-actor]
    if: always() && (needs.check-actor.result == 'success' || needs.check-actor.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build scikit-build-core pybind11
      - run: python -m build --sdist python/
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: python/dist/*.tar.gz

  # flox-mcp is a pure-Python wheel — one cross-platform build covers
  # every interpreter/OS combination. Versioned lockstep with flox-py
  # (set-version.sh keeps mcp/pyproject.toml in sync). The bundled
  # data (`mcp/flox_mcp/data/`) is regenerated by sync_mcp_data.py and
  # committed; the wheel just packages those bytes verbatim, so the
  # version users install matches the surface the data describes.
  build-mcp:
    needs: [check-actor]
    if: always() && (needs.check-actor.result == 'success' || needs.check-actor.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify bundled data is in sync
        run: |
          pip install pyyaml libclang
          python scripts/sync_mcp_data.py --check
      - run: pip install build
      - run: python -m build mcp/
      - uses: actions/upload-artifact@v4
        with:
          name: flox-mcp-dist
          path: mcp/dist/*

  publish-testpypi:
    needs: [build-wheels, build-sdist, build-mcp]
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.build-wheels.result == 'success' &&
      needs.build-sdist.result == 'success' &&
      needs.build-mcp.result == 'success'
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    needs: [build-wheels, build-sdist, build-mcp]
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.build-wheels.result == 'success' &&
      needs.build-sdist.result == 'success' &&
      needs.build-mcp.result == 'success' &&
      (startsWith(github.ref, 'refs/tags/v') || github.event.inputs.publish_pypi == 'true')
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
