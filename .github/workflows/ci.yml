name: Build and Test

on:
  push:
  pull_request:
  schedule:
    # Weekly affinity tests - Sunday at 3:00 UTC
    - cron: '0 3 * * 0'

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install clang-format
      run: sudo apt-get update && sudo apt-get install -y clang-format

    - name: Check formatting
      run: ./scripts/check-format.sh

  linux-gcc:
    needs: format-check
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build liblz4-dev g++-14 python3-dev python3-pip

    - name: Install Python packages
      run: python3 -m pip install --break-system-packages pybind11 numpy

    - name: Install Codon
      run: |
        curl -fsSL https://exaloop.io/install.sh | bash
        echo "$HOME/.codon/bin" >> $GITHUB_PATH

    - name: Build and Install GoogleTest
      run: |
        git clone --depth=1 https://github.com/google/googletest.git
        cmake -B gtest-build -S googletest -G Ninja \
          -DCMAKE_CXX_COMPILER=g++-14 \
          -DCMAKE_INSTALL_PREFIX=~/gtest-install
        cmake --build gtest-build
        cmake --install gtest-build

    - name: Build and Install Google Benchmark
      run: |
        git clone --depth=1 https://github.com/google/benchmark.git
        cmake -B benchmark-build -S benchmark -G Ninja \
          -DCMAKE_CXX_COMPILER=g++-14 \
          -DCMAKE_BUILD_TYPE=Release \
          -DBENCHMARK_DOWNLOAD_DEPENDENCIES=ON \
          -DCMAKE_INSTALL_PREFIX=~/benchmark-install
        cmake --build benchmark-build
        cmake --install benchmark-build

    - name: Configure
      run: |
        cmake -B build -G Ninja \
              -DCMAKE_CXX_COMPILER=g++-14 \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_PREFIX_PATH="$HOME/gtest-install;$HOME/benchmark-install" \
              -Dpybind11_DIR="$(python3 -c 'import pybind11; print(pybind11.get_cmake_dir())')" \
              -DFLOX_ENABLE_TESTS=ON \
              -DFLOX_ENABLE_BENCHMARKS=ON \
              -DFLOX_ENABLE_DEMO=ON \
              -DFLOX_ENABLE_LZ4=ON \
              -DFLOX_ENABLE_BACKTEST=ON \
              -DFLOX_ENABLE_CAPI=ON \
              -DFLOX_ENABLE_PYTHON=ON \
              -DFLOX_ENABLE_CODON=ON \
              -DFLOX_ENABLE_QUICKJS=ON

    - name: Build
      run: cmake --build build -j$(nproc)

    - name: Build Node.js addon
      working-directory: node
      run: npm install && npm run build

    - name: Run tests
      run: ctest --output-on-failure --test-dir build

    - name: Verify C API
      run: |
        test -f build/src/capi/libflox_capi.so
        nm -D build/src/capi/libflox_capi.so | grep -q flox_emit_market_buy
        nm -D build/src/capi/libflox_capi.so | grep -q flox_position_tracker_on_fill
        nm -D build/src/capi/libflox_capi.so | grep -q flox_order_tracker_on_submitted

    - name: Verify Python bindings
      run: PYTHONPATH=build/python python3 python/tests/test_bindings.py

    - name: Run Python example
      run: PYTHONPATH=build/python python3 docs/examples/python_backtest_vs_live.py

    - name: Verify Codon binaries
      run: |
        test -f build/codon/codon_sma_crossover
        test -f build/codon/codon_pairs_strategy
        test -f build/codon/codon_backtest_from_csv
        test -f build/codon/codon_full_backtest
        file build/codon/codon_sma_crossover | grep -q ELF

    - name: Run Codon examples
      run: |
        LD_LIBRARY_PATH=build/src/capi:$HOME/.codon/lib/codon \
          ./build/codon/codon_full_backtest
        LD_LIBRARY_PATH=build/src/capi:$HOME/.codon/lib/codon \
          ./build/codon/codon_backtest_from_csv docs/examples/data/btcusdt_1m.csv

    - name: Verify QuickJS runner
      run: |
        test -f build/src/quickjs/flox_js_runner
        ./build/src/quickjs/flox_js_runner quickjs/examples/sma_crossover.js
        ./build/src/quickjs/flox_js_runner quickjs/examples/backtest_sma.js

    - name: Verify Node.js bindings
      run: |
        cd node && node test/test_bindings.js

    - name: Run Node.js example
      run: node docs/examples/node_backtest_vs_live.js

    - name: Run demo
      run: ./build/demo/flox_demo

    - name: Run benchmarks
      run: ./scripts/run-benchmarks.sh build/benchmarks

  linux-clang:
    needs: format-check
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4

    - name: Install LLVM repository
      run: |
        wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
        echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-18 main" | sudo tee /etc/apt/sources.list.d/llvm.list

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build liblz4-dev clang-18 libc++-18-dev libc++abi-18-dev

    - name: Build and Install GoogleTest
      run: |
        git clone --depth=1 https://github.com/google/googletest.git
        cmake -B gtest-build -S googletest -G Ninja \
          -DCMAKE_CXX_COMPILER=clang++-18 \
          -DCMAKE_CXX_FLAGS="-stdlib=libc++ -fexperimental-library" \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=~/gtest-install
        cmake --build gtest-build
        cmake --install gtest-build

    - name: Build and Install Google Benchmark
      run: |
        git clone --depth=1 https://github.com/google/benchmark.git
        cmake -B benchmark-build -S benchmark -G Ninja \
          -DCMAKE_CXX_COMPILER=clang++-18 \
          -DCMAKE_CXX_FLAGS="-stdlib=libc++ -fexperimental-library" \
          -DCMAKE_BUILD_TYPE=Release \
          -DBENCHMARK_DOWNLOAD_DEPENDENCIES=ON \
          -DCMAKE_INSTALL_PREFIX=~/benchmark-install
        cmake --build benchmark-build
        cmake --install benchmark-build

    - name: Configure
      run: |
        rm -rf build
        cmake -B build -G Ninja \
              -DCMAKE_CXX_COMPILER=clang++-18 \
              -DCMAKE_CXX_FLAGS="-stdlib=libc++ -fexperimental-library" \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_PREFIX_PATH="$HOME/gtest-install;$HOME/benchmark-install" \
              -DFLOX_ENABLE_TESTS=ON \
              -DFLOX_ENABLE_BENCHMARKS=ON \
              -DFLOX_ENABLE_DEMO=ON \
              -DFLOX_ENABLE_LZ4=ON \
              -DFLOX_ENABLE_BACKTEST=ON \
              -DFLOX_ENABLE_CAPI=ON

    - name: Build
      run: cmake --build build -j$(nproc)

    - name: Run tests
      run: ctest --output-on-failure --test-dir build

    - name: Run demo
      run: ./build/demo/flox_demo

    - name: Run benchmarks
      run: ./scripts/run-benchmarks.sh build/benchmarks

  sanitizers:
    needs: format-check
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address, undefined]

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build liblz4-dev g++-14

    - name: Build and Install GoogleTest
      run: |
        git clone --depth=1 https://github.com/google/googletest.git
        cmake -B gtest-build -S googletest -G Ninja \
          -DCMAKE_CXX_COMPILER=g++-14 \
          -DCMAKE_CXX_FLAGS="-fsanitize=${{ matrix.sanitizer }} -fno-omit-frame-pointer" \
          -DCMAKE_INSTALL_PREFIX=~/gtest-install
        cmake --build gtest-build
        cmake --install gtest-build

    - name: Configure with sanitizer
      run: |
        cmake -B build -G Ninja \
              -DCMAKE_CXX_COMPILER=g++-14 \
              -DCMAKE_CXX_FLAGS="-fsanitize=${{ matrix.sanitizer }} -fno-omit-frame-pointer -g" \
              -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=${{ matrix.sanitizer }}" \
              -DCMAKE_BUILD_TYPE=Debug \
              -DCMAKE_PREFIX_PATH="$HOME/gtest-install" \
              -DFLOX_ENABLE_TESTS=ON \
              -DFLOX_ENABLE_BENCHMARKS=OFF \
              -DFLOX_ENABLE_DEMO=ON \
              -DFLOX_ENABLE_LZ4=ON \
              -DFLOX_ENABLE_BACKTEST=ON

    - name: Build
      run: cmake --build build -j$(nproc)

    - name: Run tests with sanitizer
      env:
        ASAN_OPTIONS: detect_leaks=1:abort_on_error=1
        UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
      run: ctest --output-on-failure --test-dir build

    - name: Run demo with sanitizer
      env:
        ASAN_OPTIONS: detect_leaks=1:abort_on_error=1
        UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
      run: ./build/demo/flox_demo

  macos:
    needs: format-check
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: brew install cmake ninja lz4

    - name: Build and Install GoogleTest
      run: |
        git clone --depth=1 https://github.com/google/googletest.git
        cmake -B gtest-build -S googletest -G Ninja \
          -DCMAKE_INSTALL_PREFIX=~/gtest-install
        cmake --build gtest-build
        cmake --install gtest-build

    - name: Build and Install Google Benchmark
      run: |
        git clone --depth=1 https://github.com/google/benchmark.git
        cmake -B benchmark-build -S benchmark -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DBENCHMARK_DOWNLOAD_DEPENDENCIES=ON \
          -DCMAKE_INSTALL_PREFIX=~/benchmark-install
        cmake --build benchmark-build
        cmake --install benchmark-build

    - name: Configure
      run: |
        LZ4_PREFIX=$(brew --prefix lz4)
        cmake -B build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_PREFIX_PATH="$HOME/gtest-install;$HOME/benchmark-install;$LZ4_PREFIX" \
              -DCMAKE_LIBRARY_PATH="$LZ4_PREFIX/lib" \
              -DCMAKE_INCLUDE_PATH="$LZ4_PREFIX/include" \
              -DFLOX_ENABLE_TESTS=ON \
              -DFLOX_ENABLE_BENCHMARKS=ON \
              -DFLOX_ENABLE_DEMO=ON \
              -DFLOX_ENABLE_LZ4=ON \
              -DFLOX_ENABLE_BACKTEST=ON

    - name: Build
      run: cmake --build build -j$(sysctl -n hw.ncpu)

    - name: Run tests
      run: ctest --output-on-failure --test-dir build

    - name: Run demo
      run: ./build/demo/flox_demo

  windows-msvc:
    needs: format-check
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install ninja
      run: choco install ninja -y

    - name: Install vcpkg dependencies
      run: |
        git clone https://github.com/microsoft/vcpkg.git
        .\vcpkg\bootstrap-vcpkg.bat
        .\vcpkg\vcpkg install lz4:x64-windows gtest:x64-windows benchmark:x64-windows

    - name: Configure
      run: |
        cmake -B build -G Ninja `
              -DCMAKE_BUILD_TYPE=Release `
              -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" `
              -DFLOX_ENABLE_TESTS=ON `
              -DFLOX_ENABLE_BENCHMARKS=ON `
              -DFLOX_ENABLE_DEMO=ON `
              -DFLOX_ENABLE_LZ4=ON `
              -DFLOX_ENABLE_BACKTEST=ON

    - name: Build
      run: cmake --build build -j $env:NUMBER_OF_PROCESSORS

    - name: Run tests
      run: ctest --output-on-failure --test-dir build

    - name: Run demo
      run: .\build\demo\flox_demo.exe

  windows-clang-cl:
    needs: format-check
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install dependencies
      run: choco install ninja llvm -y

    - name: Install vcpkg dependencies
      run: |
        git clone https://github.com/microsoft/vcpkg.git
        .\vcpkg\bootstrap-vcpkg.bat
        .\vcpkg\vcpkg install lz4:x64-windows gtest:x64-windows benchmark:x64-windows

    - name: Configure with clang-cl
      run: |
        cmake -B build -G Ninja `
              -DCMAKE_C_COMPILER=clang-cl `
              -DCMAKE_CXX_COMPILER=clang-cl `
              -DCMAKE_BUILD_TYPE=Release `
              -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" `
              -DFLOX_ENABLE_TESTS=ON `
              -DFLOX_ENABLE_BENCHMARKS=ON `
              -DFLOX_ENABLE_DEMO=ON `
              -DFLOX_ENABLE_LZ4=ON `
              -DFLOX_ENABLE_BACKTEST=ON

    - name: Build
      run: cmake --build build -j $env:NUMBER_OF_PROCESSORS

    - name: Run tests
      run: ctest --output-on-failure --test-dir build

    - name: Run demo
      run: .\build\demo\flox_demo.exe

  # Weekly affinity tests (Linux only)
  affinity-tests:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build liblz4-dev libnuma-dev g++-14

    - name: Build and Install GoogleTest
      run: |
        git clone --depth=1 https://github.com/google/googletest.git
        cmake -B gtest-build -S googletest -G Ninja \
          -DCMAKE_CXX_COMPILER=g++-14 \
          -DCMAKE_INSTALL_PREFIX=~/gtest-install
        cmake --build gtest-build
        cmake --install gtest-build

    - name: Build and Install Google Benchmark
      run: |
        git clone --depth=1 https://github.com/google/benchmark.git
        cmake -B benchmark-build -S benchmark -G Ninja \
          -DCMAKE_CXX_COMPILER=g++-14 \
          -DCMAKE_BUILD_TYPE=Release \
          -DBENCHMARK_DOWNLOAD_DEPENDENCIES=ON \
          -DCMAKE_INSTALL_PREFIX=~/benchmark-install
        cmake --build benchmark-build
        cmake --install benchmark-build

    - name: Configure with CPU affinity
      run: |
        cmake -B build -G Ninja \
              -DCMAKE_CXX_COMPILER=g++-14 \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_PREFIX_PATH="$HOME/gtest-install;$HOME/benchmark-install" \
              -DFLOX_ENABLE_TESTS=ON \
              -DFLOX_ENABLE_BENCHMARKS=ON \
              -DFLOX_ENABLE_DEMO=ON \
              -DFLOX_ENABLE_LZ4=ON \
              -DFLOX_ENABLE_CPU_AFFINITY=ON \
              -DFLOX_ENABLE_BACKTEST=ON

    - name: Build
      run: cmake --build build -j$(nproc)

    - name: Run all tests including affinity
      run: ctest --output-on-failure --test-dir build

    - name: Run demo
      run: ./build/demo/flox_demo

    - name: Run benchmarks
      run: ./scripts/run-benchmarks.sh build/benchmarks
