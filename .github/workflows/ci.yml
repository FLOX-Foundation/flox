name: Build and Test

on:
  push:
  pull_request:
  schedule:
    # Weekly affinity tests - Sunday at 3:00 UTC
    - cron: '0 3 * * 0'

# Fast-fail: a new push to the same branch / PR cancels the in-progress run.
# Build jobs (linux-*, macos, windows-*, sanitizers) depend on the quick
# format-check + verify-docs-current jobs, so a docs / format failure no
# longer leaves the multi-OS matrix burning cycles for ~10 minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install clang-format
      run: sudo apt-get update && sudo apt-get install -y clang-format

    - name: Check formatting
      run: ./scripts/check-format.sh

  verify-docs-current:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Verify indicator docs are in sync with registry.def
      run: |
        python3 scripts/gen_indicator_docs.py
        if ! git diff --exit-code -- docs/; then
          echo "::error::docs/ out of sync with include/flox/indicator/registry.def"
          echo "Run: python3 scripts/gen_indicator_docs.py"
          exit 1
        fi
    - name: Verify llms.txt and llms-full.txt are in sync with docs/
      run: python3 scripts/gen_llms_txt.py --check
    - name: Verify node/index.d.ts exports match the C++ binding
      run: python3 scripts/check_dts_exports.py
    - name: Verify cross-binding parity (pybind11/napi/codon)
      run: |
        pip install pyyaml
        python3 scripts/check_binding_parity.py
    - name: Verify error codes have docs and pages aren't stale
      run: python3 scripts/check_error_codes.py
    - name: Verify Python API index is in sync with .pyi
      run: python3 scripts/gen_api_index.py --check
    - name: Verify doc snippets follow the --8<-- include pattern
      run: |
        # Ratchet floor: 6 `--8<--` includes today (2% of 288 typed
        # blocks). Migration target is W2-T011 (50% coverage). Bump the
        # floor in this step every time a PR successfully migrates more
        # snippets — never lower it.
        python3 scripts/check_doc_snippets.py --min-includes 6
    - name: Verify flox-mcp bundled data is in sync
      run: |
        # IR snapshot is built from the IDL via libclang, plus the
        # binding manifest reads binding_parity.yaml — both deps need
        # to be present in this job for --check to run end-to-end.
        python3 -m pip install --break-system-packages libclang pyyaml
        python3 scripts/sync_mcp_data.py --check
    - name: flox-mcp unit tests
      run: |
        python3 -m pip install --break-system-packages pytest
        python3 -m pytest mcp/tests/ -q

  linux-gcc:
    needs: [format-check, verify-docs-current]
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build liblz4-dev g++-14 python3-dev python3-pip

    - name: Install Python packages
      run: python3 -m pip install --break-system-packages pybind11 numpy pybind11-stubgen mypy pyright

    - name: Install Codon
      env:
        CODON_VERSION: v0.19.6
      run: |
        mkdir -p ~/.codon && cd ~/.codon
        curl -fsSL "https://github.com/exaloop/codon/releases/download/${CODON_VERSION}/codon-linux-x86_64.tar.gz" \
          | tar zxf - --strip-components=1
        echo "$HOME/.codon/bin" >> $GITHUB_PATH

    - name: Build and Install GoogleTest
      run: |
        git clone --depth=1 https://github.com/google/googletest.git
        cmake -B gtest-build -S googletest -G Ninja \
          -DCMAKE_CXX_COMPILER=g++-14 \
          -DCMAKE_INSTALL_PREFIX=~/gtest-install
        cmake --build gtest-build
        cmake --install gtest-build

    - name: Build and Install Google Benchmark
      run: |
        git clone --depth=1 https://github.com/google/benchmark.git
        cmake -B benchmark-build -S benchmark -G Ninja \
          -DCMAKE_CXX_COMPILER=g++-14 \
          -DCMAKE_BUILD_TYPE=Release \
          -DBENCHMARK_DOWNLOAD_DEPENDENCIES=ON \
          -DCMAKE_INSTALL_PREFIX=~/benchmark-install
        cmake --build benchmark-build
        cmake --install benchmark-build

    - name: Configure
      run: |
        cmake -B build -G Ninja \
              -DCMAKE_CXX_COMPILER=g++-14 \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_PREFIX_PATH="$HOME/gtest-install;$HOME/benchmark-install" \
              -Dpybind11_DIR="$(python3 -c 'import pybind11; print(pybind11.get_cmake_dir())')" \
              -DFLOX_BUILD_TESTS=ON \
              -DFLOX_BUILD_BENCHMARKS=ON \
              -DFLOX_BUILD_DEMO=ON \
              -DFLOX_ENABLE_LZ4=ON \
              -DFLOX_ENABLE_BACKTEST=ON \
              -DFLOX_BUILD_CAPI=ON \
              -DFLOX_BUILD_PYTHON=ON \
              -DFLOX_BUILD_CODON=ON \
              -DFLOX_BUILD_QUICKJS=ON

    - name: Build
      run: cmake --build build -j$(nproc)

    - name: Build Node.js addon
      working-directory: node
      env:
        CXX: g++-14
        CC: gcc-14
      run: npm install && npm run build

    - name: Type-check node/index.d.ts
      working-directory: node
      run: npm run typecheck

    - name: Run tests
      run: ctest --output-on-failure --test-dir build

    - name: Verify C API
      run: |
        test -f build/src/capi/libflox_capi.so
        nm -D build/src/capi/libflox_capi.so | grep -q flox_emit_market_buy
        nm -D build/src/capi/libflox_capi.so | grep -q flox_position_tracker_on_fill
        nm -D build/src/capi/libflox_capi.so | grep -q flox_order_tracker_on_submitted

    - name: Verify Python bindings
      run: PYTHONPATH=build/python python3 python/tests/test_bindings.py

    - name: Verify Python extension hooks
      run: PYTHONPATH=build/python python3 python/tests/test_hooks.py

    - name: Verify flox new CLI scaffolder
      run: PYTHONPATH=build/python python3 python/tests/test_flox_new_cli.py

    - name: Verify flox tape CLI (record / replay / inspect)
      run: PYTHONPATH=build/python python3 python/tests/test_tape_cli.py

    - name: Verify PaperBroker (sandbox / paper trading mode)
      run: PYTHONPATH=build/python python3 python/tests/test_paper.py

    - name: Verify reproducibility bundle (flox bundle pack/replay/validate)
      run: PYTHONPATH=build/python python3 python/tests/test_bundle.py

    - name: Verify ControlServer (HTTP control plane + auth + audit + rate limits)
      run: PYTHONPATH=build/python python3 python/tests/test_control_server.py

    - name: Verify EventLog (in-memory ring buffer for live analytics)
      run: PYTHONPATH=build/python python3 python/tests/test_event_log.py

    - name: Verify lookahead-bias detector (static AST analysis)
      run: PYTHONPATH=build/python python3 python/tests/test_lookahead.py

    - name: Verify flox tape diff CLI
      run: PYTHONPATH=build/python python3 python/tests/test_tape_diff.py

    - name: Verify portfolio risk aggregator
      run: PYTHONPATH=build/python python3 python/tests/test_portfolio_risk.py

    - name: Verify latency models
      run: PYTHONPATH=build/python python3 python/tests/test_latency_models.py

    - name: Verify execution algorithms
      run: PYTHONPATH=build/python python3 python/tests/test_execution_algos.py

    - name: Verify RL environment
      run: PYTHONPATH=build/python python3 python/tests/test_rl_env.py

    - name: Replay-equivalence CI gate (W2-T017)
      run: python3 scripts/replay_equivalence_gate.py

    - name: Verify Python CCXT adapter (mock-based)
      run: PYTHONPATH=build/python python3 python/tests/test_ccxt_adapter.py

    - name: Verify .pyi stubs are in sync with the binding
      run: python3 scripts/gen_pyi_stubs.py --check

    - name: Type-check Python examples with mypy
      run: PYTHONPATH=build/python python3 -m mypy --ignore-missing-imports
        docs/examples/python_backtest_vs_live.py
        docs/examples/python_multi_symbol.py
        docs/examples/python_ccxt_live.py
        docs/examples/python_tape_roundtrip.py

    # Pyright is what Cursor / Pylance / VSCode actually run; mypy and
    # pyright sometimes disagree, and the AI-DX goal is the editor
    # experience. The CCXT example is excluded because ccxt itself ships
    # without typing for its primary surface and pyright (unlike mypy)
    # has no global "ignore missing imports" mode that's safe to use.
    - name: Type-check Python examples with pyright
      run: PYTHONPATH=build/python python3 -m pyright
        docs/examples/python_backtest_vs_live.py
        docs/examples/python_multi_symbol.py

    - name: Run Python example
      run: PYTHONPATH=build/python python3 docs/examples/python_backtest_vs_live.py

    - name: Run Python tape round-trip example
      run: PYTHONPATH=build/python python3 docs/examples/python_tape_roundtrip.py

    - name: Verify Codon binaries
      run: |
        test -f build/codon/codon_sma_crossover
        test -f build/codon/codon_pairs_strategy
        test -f build/codon/codon_backtest_from_csv
        test -f build/codon/codon_full_backtest
        file build/codon/codon_sma_crossover | grep -q ELF

    - name: Run Codon examples
      run: |
        LD_LIBRARY_PATH=build/src/capi:$HOME/.codon/lib/codon \
          ./build/codon/codon_full_backtest
        LD_LIBRARY_PATH=build/src/capi:$HOME/.codon/lib/codon \
          ./build/codon/codon_backtest_from_csv docs/examples/data/btcusdt_1m.csv
        LD_LIBRARY_PATH=build/src/capi:$HOME/.codon/lib/codon \
          ./build/codon/codon_latency_smoke

    - name: Verify QuickJS runner
      run: |
        test -f build/src/quickjs/flox_js_runner
        ./build/src/quickjs/flox_js_runner quickjs/examples/sma_crossover.js
        ./build/src/quickjs/flox_js_runner quickjs/examples/backtest_sma.js
        ./build/src/quickjs/flox_js_runner quickjs/examples/latency_smoke.js

    - name: Verify Node.js bindings
      run: |
        cd node && node test/test_bindings.js

    - name: Verify Node.js latency models
      run: |
        cd node && node test/test_latency.js

    - name: Verify Node.js extension hooks
      run: |
        cd node && node test/test_hooks.js

    - name: Verify Node.js FloxError surface
      run: |
        cd node && node test/test_flox_error.js

    - name: Verify Node.js TypeScript authoring layer
      run: |
        cd node
        npx tsc -p authoring/tsconfig.json
        npx tsc -p test/tsconfig.authoring.json
        node .test-build/test_authoring.js

    - name: Cross-binding parity (Python ↔ Node, same C++ math)
      run: PYTHONPATH=build/python python3 scripts/cross_binding_parity.py

    - name: Run Node.js example
      run: node docs/examples/node_backtest_vs_live.js

    - name: Run demo
      run: ./build/demo/flox_demo

    - name: Run benchmarks
      run: ./scripts/run-benchmarks.sh build/benchmarks

  linux-clang:
    needs: [format-check, verify-docs-current]
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4

    - name: Install LLVM repository
      run: |
        wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
        echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-18 main" | sudo tee /etc/apt/sources.list.d/llvm.list

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build liblz4-dev clang-18 libc++-18-dev libc++abi-18-dev

    - name: Build and Install GoogleTest
      run: |
        git clone --depth=1 https://github.com/google/googletest.git
        cmake -B gtest-build -S googletest -G Ninja \
          -DCMAKE_CXX_COMPILER=clang++-18 \
          -DCMAKE_CXX_FLAGS="-stdlib=libc++ -fexperimental-library" \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=~/gtest-install
        cmake --build gtest-build
        cmake --install gtest-build

    - name: Build and Install Google Benchmark
      run: |
        git clone --depth=1 https://github.com/google/benchmark.git
        cmake -B benchmark-build -S benchmark -G Ninja \
          -DCMAKE_CXX_COMPILER=clang++-18 \
          -DCMAKE_CXX_FLAGS="-stdlib=libc++ -fexperimental-library" \
          -DCMAKE_BUILD_TYPE=Release \
          -DBENCHMARK_DOWNLOAD_DEPENDENCIES=ON \
          -DCMAKE_INSTALL_PREFIX=~/benchmark-install
        cmake --build benchmark-build
        cmake --install benchmark-build

    - name: Configure
      run: |
        rm -rf build
        cmake -B build -G Ninja \
              -DCMAKE_CXX_COMPILER=clang++-18 \
              -DCMAKE_CXX_FLAGS="-stdlib=libc++ -fexperimental-library" \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_PREFIX_PATH="$HOME/gtest-install;$HOME/benchmark-install" \
              -DFLOX_BUILD_TESTS=ON \
              -DFLOX_BUILD_BENCHMARKS=ON \
              -DFLOX_BUILD_DEMO=ON \
              -DFLOX_ENABLE_LZ4=ON \
              -DFLOX_ENABLE_BACKTEST=ON \
              -DFLOX_BUILD_CAPI=ON

    - name: Build
      run: cmake --build build -j$(nproc)

    - name: Run tests
      run: ctest --output-on-failure --test-dir build

    - name: Run demo
      run: ./build/demo/flox_demo

    - name: Run benchmarks
      run: ./scripts/run-benchmarks.sh build/benchmarks

  sanitizers:
    needs: [format-check, verify-docs-current]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address, undefined]

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build liblz4-dev g++-14

    - name: Build and Install GoogleTest
      run: |
        git clone --depth=1 https://github.com/google/googletest.git
        cmake -B gtest-build -S googletest -G Ninja \
          -DCMAKE_CXX_COMPILER=g++-14 \
          -DCMAKE_CXX_FLAGS="-fsanitize=${{ matrix.sanitizer }} -fno-omit-frame-pointer" \
          -DCMAKE_INSTALL_PREFIX=~/gtest-install
        cmake --build gtest-build
        cmake --install gtest-build

    - name: Configure with sanitizer
      run: |
        cmake -B build -G Ninja \
              -DCMAKE_CXX_COMPILER=g++-14 \
              -DCMAKE_CXX_FLAGS="-fsanitize=${{ matrix.sanitizer }} -fno-omit-frame-pointer -g" \
              -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=${{ matrix.sanitizer }}" \
              -DCMAKE_BUILD_TYPE=Debug \
              -DCMAKE_PREFIX_PATH="$HOME/gtest-install" \
              -DFLOX_BUILD_TESTS=ON \
              -DFLOX_BUILD_BENCHMARKS=OFF \
              -DFLOX_BUILD_DEMO=ON \
              -DFLOX_ENABLE_LZ4=ON \
              -DFLOX_ENABLE_BACKTEST=ON

    - name: Build
      run: cmake --build build -j$(nproc)

    - name: Run tests with sanitizer
      env:
        ASAN_OPTIONS: detect_leaks=1:abort_on_error=1
        UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
      run: ctest --output-on-failure --test-dir build

    - name: Run demo with sanitizer
      env:
        ASAN_OPTIONS: detect_leaks=1:abort_on_error=1
        UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
      run: ./build/demo/flox_demo

  macos:
    needs: [format-check, verify-docs-current]
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: brew install cmake ninja lz4

    - name: Build and Install GoogleTest
      run: |
        git clone --depth=1 https://github.com/google/googletest.git
        cmake -B gtest-build -S googletest -G Ninja \
          -DCMAKE_INSTALL_PREFIX=~/gtest-install
        cmake --build gtest-build
        cmake --install gtest-build

    - name: Build and Install Google Benchmark
      run: |
        git clone --depth=1 https://github.com/google/benchmark.git
        cmake -B benchmark-build -S benchmark -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DBENCHMARK_DOWNLOAD_DEPENDENCIES=ON \
          -DCMAKE_INSTALL_PREFIX=~/benchmark-install
        cmake --build benchmark-build
        cmake --install benchmark-build

    - name: Configure
      run: |
        LZ4_PREFIX=$(brew --prefix lz4)
        cmake -B build -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_PREFIX_PATH="$HOME/gtest-install;$HOME/benchmark-install;$LZ4_PREFIX" \
              -DCMAKE_LIBRARY_PATH="$LZ4_PREFIX/lib" \
              -DCMAKE_INCLUDE_PATH="$LZ4_PREFIX/include" \
              -DFLOX_BUILD_TESTS=ON \
              -DFLOX_BUILD_BENCHMARKS=ON \
              -DFLOX_BUILD_DEMO=ON \
              -DFLOX_ENABLE_LZ4=ON \
              -DFLOX_ENABLE_BACKTEST=ON

    - name: Build
      run: cmake --build build -j$(sysctl -n hw.ncpu)

    - name: Run tests
      run: ctest --output-on-failure --test-dir build

    - name: Run demo
      run: ./build/demo/flox_demo

  windows-msvc:
    needs: [format-check, verify-docs-current]
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install ninja
      run: choco install ninja -y

    - name: Install vcpkg dependencies
      run: |
        git clone https://github.com/microsoft/vcpkg.git
        .\vcpkg\bootstrap-vcpkg.bat
        .\vcpkg\vcpkg install lz4:x64-windows gtest:x64-windows benchmark:x64-windows

    - name: Configure
      run: |
        cmake -B build -G Ninja `
              -DCMAKE_BUILD_TYPE=Release `
              -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" `
              -DFLOX_BUILD_TESTS=ON `
              -DFLOX_BUILD_BENCHMARKS=ON `
              -DFLOX_BUILD_DEMO=ON `
              -DFLOX_ENABLE_LZ4=ON `
              -DFLOX_ENABLE_BACKTEST=ON

    - name: Build
      run: cmake --build build -j $env:NUMBER_OF_PROCESSORS

    - name: Run tests
      run: ctest --output-on-failure --test-dir build

    - name: Run demo
      run: .\build\demo\flox_demo.exe

  windows-clang-cl:
    needs: [format-check, verify-docs-current]
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Install dependencies
      run: choco install ninja llvm -y

    - name: Install vcpkg dependencies
      run: |
        git clone https://github.com/microsoft/vcpkg.git
        .\vcpkg\bootstrap-vcpkg.bat
        .\vcpkg\vcpkg install lz4:x64-windows gtest:x64-windows benchmark:x64-windows

    - name: Configure with clang-cl
      run: |
        cmake -B build -G Ninja `
              -DCMAKE_C_COMPILER=clang-cl `
              -DCMAKE_CXX_COMPILER=clang-cl `
              -DCMAKE_BUILD_TYPE=Release `
              -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" `
              -DFLOX_BUILD_TESTS=ON `
              -DFLOX_BUILD_BENCHMARKS=ON `
              -DFLOX_BUILD_DEMO=ON `
              -DFLOX_ENABLE_LZ4=ON `
              -DFLOX_ENABLE_BACKTEST=ON

    - name: Build
      run: cmake --build build -j $env:NUMBER_OF_PROCESSORS

    - name: Run tests
      run: ctest --output-on-failure --test-dir build

    - name: Run demo
      run: .\build\demo\flox_demo.exe

  # Weekly affinity tests (Linux only)
  affinity-tests:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build liblz4-dev libnuma-dev g++-14

    - name: Build and Install GoogleTest
      run: |
        git clone --depth=1 https://github.com/google/googletest.git
        cmake -B gtest-build -S googletest -G Ninja \
          -DCMAKE_CXX_COMPILER=g++-14 \
          -DCMAKE_INSTALL_PREFIX=~/gtest-install
        cmake --build gtest-build
        cmake --install gtest-build

    - name: Build and Install Google Benchmark
      run: |
        git clone --depth=1 https://github.com/google/benchmark.git
        cmake -B benchmark-build -S benchmark -G Ninja \
          -DCMAKE_CXX_COMPILER=g++-14 \
          -DCMAKE_BUILD_TYPE=Release \
          -DBENCHMARK_DOWNLOAD_DEPENDENCIES=ON \
          -DCMAKE_INSTALL_PREFIX=~/benchmark-install
        cmake --build benchmark-build
        cmake --install benchmark-build

    - name: Configure with CPU affinity
      run: |
        cmake -B build -G Ninja \
              -DCMAKE_CXX_COMPILER=g++-14 \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_PREFIX_PATH="$HOME/gtest-install;$HOME/benchmark-install" \
              -DFLOX_BUILD_TESTS=ON \
              -DFLOX_BUILD_BENCHMARKS=ON \
              -DFLOX_BUILD_DEMO=ON \
              -DFLOX_ENABLE_LZ4=ON \
              -DFLOX_ENABLE_CPU_AFFINITY=ON \
              -DFLOX_ENABLE_BACKTEST=ON

    - name: Build
      run: cmake --build build -j$(nproc)

    - name: Run all tests including affinity
      run: ctest --output-on-failure --test-dir build

    - name: Run demo
      run: ./build/demo/flox_demo

    - name: Run benchmarks
      run: ./scripts/run-benchmarks.sh build/benchmarks

  connectors-build:
    needs: [format-check, verify-docs-current]
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build g++-14 \
                                libssl-dev zlib1g-dev libcurl4-openssl-dev

    # Network deps (ixwebsocket, simdjson) come in via FetchContent
    # at configure time. Polymarket Rust FFI is opt-OUT here so the
    # job doesn't need a Rust toolchain.
    - name: Configure
      run: |
        cmake -B build -G Ninja \
              -DCMAKE_CXX_COMPILER=g++-14 \
              -DCMAKE_BUILD_TYPE=Release \
              -DFLOX_BUILD_CONNECTORS=ON \
              -DFLOX_ENABLE_POLYMARKET_ORDER_EXECUTOR=OFF

    - name: Build connectors target
      run: cmake --build build --target flox-connectors -j$(nproc)

    - name: Verify static archive exists
      run: test -f build/connectors/libflox-connectors.a
